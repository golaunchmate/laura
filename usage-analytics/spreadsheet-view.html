<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaunchMate Usage Data - Spreadsheet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400,500,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }
        h1 { color: #1a1a2e; margin-bottom: 0.5rem; }
        .subtitle { color: #666; margin-bottom: 2rem; }
        .loading { color: #666; padding: 2rem; text-align: center; }
        .copy-btn {
            background: #4285f4;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }
        .copy-btn:hover { background: #3367d6; }
        .copied { background: #34a853 !important; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            background: #1a1a2e;
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.875rem;
            position: sticky;
            top: 0;
        }
        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #eee;
            font-size: 0.875rem;
        }
        tr:hover td { background: #f9f9f9; }
        .cohort-inflight { color: #4285f4; font-weight: 600; }
        .cohort-launch_track { color: #34a853; font-weight: 600; }
        .number { font-family: monospace; text-align: center; }
        .highlight { background: #e8f5e9; }
        .note {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #fff3cd;
            border-radius: 8px;
            color: #856404;
            font-size: 0.875rem;
        }
        .data-source {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #e3f2fd;
            border-radius: 8px;
            color: #1565c0;
            font-size: 0.8rem;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>LaunchMate Usage Data</h1>
    <p class="subtitle" id="subtitle">Loading data...</p>

    <button class="copy-btn" onclick="copyTable()">📋 Copy Entire Table</button>

    <table id="dataTable">
        <thead>
            <tr>
                <th style="text-align:center">#</th>
                <th>Name</th>
                <th>Company Name</th>
                <th>Description</th>
                <th style="text-align:center">First Chat</th>
                <th style="text-align:center"># Chats</th>
                <th style="text-align:center"># Agent</th>
                <th style="text-align:center">Weeks Active</th>
                <th style="text-align:center">Msgs/Week</th>
                <th style="text-align:center">Cohort</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="10" class="loading">Loading data from API...</td></tr>
        </tbody>
    </table>

    <div class="note">
        <strong>💡 Tip:</strong> Click "Copy Entire Table" then paste directly into Google Sheets (Ctrl+V or Cmd+V). The data will format automatically into cells.
    </div>

    <div class="data-source" id="dataSource"></div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('founders-data.json');
                const data = await response.json();
                
                // Update subtitle
                document.getElementById('subtitle').textContent = 
                    `${data.metadata.lastUpdated} • ${data.totalFounders} founders • From first user message date`;
                
                // Update data source info
                document.getElementById('dataSource').textContent = 
                    `📊 Data source: ${data.metadata.source} | Methodology: ${data.metadata.methodology}`;
                
                // Render table
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                data.founders.forEach(founder => {
                    const row = document.createElement('tr');
                    const highlightClass = founder.msgsPerWeek >= 2 ? 'highlight' : '';
                    const cohortClass = founder.cohort === 'inflight' ? 'cohort-inflight' : 'cohort-launch_track';
                    const cohortDisplay = founder.cohort === 'inflight' ? 'In Flight' : 'Launch Track';
                    
                    row.innerHTML = `
                        <td class="number">${founder.rank}</td>
                        <td>${founder.name}</td>
                        <td>${founder.company}</td>
                        <td>${founder.description}</td>
                        <td class="number">${founder.firstChat}</td>
                        <td class="number">${founder.userMessages}</td>
                        <td class="number">${founder.agentResponses}</td>
                        <td class="number">${founder.weeks}</td>
                        <td class="number ${highlightClass}">${founder.msgsPerWeek.toFixed(2)}</td>
                        <td class="${cohortClass}">${cohortDisplay}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                document.getElementById('tableBody').innerHTML = 
                    `<tr><td colspan="10" style="color:red;text-align:center;padding:2rem;">Error loading data: ${error.message}</td></tr>`;
            }
        }

        function copyTable() {
            const table = document.getElementById('dataTable');
            const range = document.createRange();
            range.selectNode(table);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);

            try {
                document.execCommand('copy');
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✓ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copy Entire Table';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                alert('Copy failed - try selecting the table manually');
            }

            window.getSelection().removeAllRanges();
        }

        // Load data on page load
        loadData();
    </script>
</body>
</html>
